<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Server Monitor{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <style>
        /* Modern Neon Color Palette */
        :root {
            --neon-green: #7CFF3A;
            --pure-white: #FFFFFF;
            --light-gray: #BFC3C7;
            --dark-gray: #2F3336;
            --near-black: #0B0C0E;
            
            /* Extended palette */
            --neon-green-dark: #5FE01A;
            --neon-green-light: #9DFF6A;
            --light-gray-dark: #A5A9AD;
            --light-gray-light: #D8DADC;
            --dark-gray-light: #3D4144;
            --dark-gray-dark: #1F2225;
        }
        
        body {
            background: linear-gradient(135deg, var(--near-black) 0%, var(--dark-gray) 100%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--pure-white);
        }
        
        .metric-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            box-shadow: 0 4px 20px rgba(124, 255, 58, 0.1);
            background: linear-gradient(135deg, var(--dark-gray) 0%, var(--dark-gray-light) 100%);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }
        
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-green-light));
            box-shadow: 0 0 20px rgba(124, 255, 58, 0.5);
        }
        
        .metric-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(124, 255, 58, 0.2);
            border: 1px solid rgba(124, 255, 58, 0.3);
        }
        
        .metric-card:hover::before {
            height: 6px;
            box-shadow: 0 0 30px rgba(124, 255, 58, 0.7);
        }
        
        .progress {
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            background-color: var(--dark-gray-dark);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .progress-bar {
            transition: width 0.6s ease;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(124, 255, 58, 0.3);
        }
        
        .server-panel {
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, var(--dark-gray) 0%, var(--dark-gray-light) 100%);
            border: 1px solid rgba(191, 195, 199, 0.1);
        }
        
        .server-panel.offline {
            opacity: 0.6;
            filter: grayscale(0.5);
            border-color: rgba(255, 0, 0, 0.3);
        }
        
        .server-panel:hover {
            box-shadow: 0 8px 30px rgba(124, 255, 58, 0.15);
            transform: translateY(-2px);
            border-color: rgba(124, 255, 58, 0.3);
        }
        
        .chart-container {
            position: relative;
            height: 280px;
            background: linear-gradient(135deg, var(--dark-gray) 0%, var(--dark-gray-light) 100%);
            border-radius: 16px;
            padding: 20px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(191, 195, 199, 0.1);
        }
        
        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(124, 255, 58, 0.3);
        }
        
        .metric-label {
            font-size: 0.875rem;
            color: var(--pure-white);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        .text-muted {
            color: var(--light-gray-light) !important;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        
        .card-body {
            color: var(--pure-white);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        .card-title {
            color: var(--pure-white);
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        .card-text {
            color: var(--light-gray-light);
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        
        .status-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.2);
        }
        
        .status-online {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            box-shadow: 0 0 0 4px rgba(124, 255, 58, 0.3), 0 0 20px rgba(124, 255, 58, 0.5);
        }
        
        .status-offline {
            background: linear-gradient(135deg, #FF4444, #CC0000);
            box-shadow: 0 0 0 4px rgba(255, 68, 68, 0.3), 0 0 20px rgba(255, 68, 68, 0.5);
        }
        
        @keyframes pulse {
            0% { 
                opacity: 1; 
                transform: scale(1);
            }
            50% { 
                opacity: 0.7; 
                transform: scale(1.1);
            }
            100% { 
                opacity: 1; 
                transform: scale(1);
            }
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--near-black) 0%, var(--dark-gray-dark) 100%) !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid var(--neon-green);
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(124, 255, 58, 0.5);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.8));
        }
        
        .navbar-nav .nav-link {
            color: var(--pure-white) !important;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        .navbar-nav .nav-link:hover {
            color: var(--neon-green) !important;
            text-shadow: 0 0 10px rgba(124, 255, 58, 0.5);
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--dark-gray) 0%, var(--dark-gray-light) 100%) !important;
            color: var(--pure-white);
            border: none;
            font-weight: 700;
            border-bottom: 2px solid var(--neon-green);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        .btn {
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            border: none;
            color: var(--near-black);
            font-weight: 700;
            text-shadow: none;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--neon-green-light), var(--neon-green));
            box-shadow: 0 4px 16px rgba(124, 255, 58, 0.6);
        }
        
        .btn-outline-primary {
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            background: transparent;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        
        .btn-outline-primary:hover {
            background: var(--neon-green);
            color: var(--near-black);
            box-shadow: 0 4px 16px rgba(124, 255, 58, 0.6);
            text-shadow: none;
        }
        
        .btn-outline-light {
            border: 2px solid var(--light-gray);
            color: var(--pure-white);
            background: transparent;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        
        .btn-outline-light:hover {
            background: var(--light-gray);
            color: var(--near-black);
            border-color: var(--pure-white);
            text-shadow: none;
        }
        
        .pagination .page-link {
            border-radius: 8px;
            margin: 0 4px;
            border: 1px solid var(--light-gray-dark);
            color: var(--pure-white);
            font-weight: 600;
            transition: all 0.2s ease;
            background: var(--dark-gray);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        
        .pagination .page-link:hover {
            background: var(--neon-green);
            border-color: var(--neon-green);
            color: var(--near-black);
            box-shadow: 0 2px 8px rgba(124, 255, 58, 0.4);
            text-shadow: none;
        }
        
        .pagination .page-item.active .page-link {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            border-color: var(--neon-green);
            color: var(--near-black);
            box-shadow: 0 2px 12px rgba(124, 255, 58, 0.5);
            text-shadow: none;
            font-weight: 700;
        }
        
        .search-box {
            max-width: 400px;
        }
        
        .search-box .form-control {
            border-radius: 25px;
            border: 2px solid var(--light-gray-dark);
            padding-left: 20px;
            transition: all 0.3s ease;
            background: var(--dark-gray);
            color: var(--pure-white);
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        
        .search-box .form-control:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 0 4px rgba(124, 255, 58, 0.1), 0 0 20px rgba(124, 255, 58, 0.3);
            background: var(--dark-gray-light);
        }
        
        .search-box .form-control::placeholder {
            color: var(--light-gray-light);
            font-weight: 500;
        }
        
        .form-label {
            color: var(--pure-white);
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        
        .form-control {
            background: var(--dark-gray);
            border: 1px solid var(--light-gray-dark);
            color: var(--pure-white);
            font-weight: 500;
        }
        
        .form-control:focus {
            background: var(--dark-gray-light);
            border-color: var(--neon-green);
            box-shadow: 0 0 0 4px rgba(124, 255, 58, 0.1);
            color: var(--pure-white);
        }
        
        .modal-content {
            background: var(--dark-gray);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 30px rgba(124, 255, 58, 0.2);
        }
        
        .modal-header {
            background: linear-gradient(135deg, var(--dark-gray) 0%, var(--dark-gray-light) 100%);
            border-bottom: 2px solid var(--neon-green);
            color: var(--pure-white);
        }
        
        .modal-title {
            color: var(--pure-white);
            font-weight: 700;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        .modal-body {
            color: var(--pure-white);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        
        .close {
            color: var(--pure-white);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        .close:hover {
            color: var(--neon-green);
        }
        
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 24px;
        }
        
        @media (max-width: 768px) {
            .server-grid {
                grid-template-columns: 1fr;
            }
            
            .metric-value {
                font-size: 2rem;
            }
        }
        
        /* Enhanced animations */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Neon glow effects */
        .neon-glow {
            box-shadow: 0 0 20px rgba(124, 255, 58, 0.3);
        }
        
        .neon-text {
            text-shadow: 0 0 10px rgba(124, 255, 58, 0.5);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--dark-gray);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-green-dark);
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-server"></i> Server Monitor
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#addServerModal">
                            <i class="bi bi-plus-circle"></i> Add Server
                        </a>
                    </li>
                </ul>
                <span class="navbar-text">
                    <i class="bi bi-clock"></i> 
                    Last updated: <span id="lastUpdate">Never</span>
                </span>
            </div>
        </div>
    </nav>

    <main class="container-fluid mt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Add Server Modal -->
    <div class="modal fade" id="addServerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Server</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addServerForm">
                        <div class="mb-3">
                            <label for="serverName" class="form-label">Server Name</label>
                            <input type="text" class="form-control" id="serverName" required>
                        </div>
                        <div class="mb-3">
                            <label for="serverIp" class="form-label">IP Address</label>
                            <input type="text" class="form-control" id="serverIp" placeholder="192.168.1.100" required>
                            <div class="form-text">Server must have Netdata running on port 19999</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addServer()">Add Server</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Auto-refresh dashboard every 30 seconds
        setInterval(() => {
            location.reload();
        }, 30000);
        
        // Update last update time
        function updateLastUpdateTime() {
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }
        
        updateLastUpdateTime();
        
        // Add server function
        async function addServer() {
            const name = document.getElementById('serverName').value;
            const ip = document.getElementById('serverIp').value;
            
            if (!name || !ip) {
                alert('Please fill in all fields');
                return;
            }
            
            try {
                const response = await fetch('/servers', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, ip_address: ip })
                });
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('addServerModal')).hide();
                    document.getElementById('addServerForm').reset();
                    location.reload();
                } else {
                    const error = await response.json();
                    alert('Error: ' + (error.error || 'Failed to add server'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // Remove server function
        async function removeServer(serverId, serverName) {
            if (!confirm(`Are you sure you want to remove ${serverName}?`)) {
                return;
            }
            
            try {
                const response = await fetch(`/servers/${serverId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    location.reload();
                } else {
                    const error = await response.json();
                    alert('Error: ' + (error.error || 'Failed to remove server'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // Format bytes to human readable
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // Format uptime
        function formatUptime(seconds) {
            if (seconds <= 0) {
                return 'Unknown';
            }
            
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            
            // Professional uptime formatting with better readability
            if (days > 0) {
                if (days >= 365) {
                    const years = Math.floor(days / 365);
                    const remainingDays = days % 365;
                    return `${years}y ${remainingDays}d ${hours}h`;
                } else if (days >= 30) {
                    const months = Math.floor(days / 30);
                    const remainingDays = days % 30;
                    return `${months}mo ${remainingDays}d ${hours}h`;
                } else {
                    return `${days}d ${hours}h ${minutes}m`;
                }
            } else if (hours > 0) {
                return `${hours}h ${minutes}m`;
            } else if (minutes > 0) {
                return `${minutes}m`;
            } else {
                return '< 1m';
            }
        }
        
        // Enhanced uptime display with status indicators
        function getUptimeStatus(seconds) {
            if (seconds <= 0) return 'unknown';
            if (seconds < 3600) return 'critical'; // Less than 1 hour
            if (seconds < 86400) return 'warning';  // Less than 1 day
            if (seconds < 604800) return 'good';     // Less than 1 week
            return 'excellent'; // More than 1 week
        }
        
        function getUptimeColor(seconds) {
            const status = getUptimeStatus(seconds);
            switch(status) {
                case 'critical': return '#FF4444';
                case 'warning': return '#FFA500';
                case 'good': return '#7CFF3A';
                case 'excellent': return '#5FE01A';
                default: return '#BFC3C7';
            }
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
